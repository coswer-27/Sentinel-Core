name: Backend Quality Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r api_gateway/requirements.txt
          pip install -r service_nlp/requirements.txt
          pip install -r service_link_scanner/requirements.txt

      - name: Run Lint
        run: |
          # 檢查語法錯誤 (E9, F63, F7, F82)
          flake8 api_gateway/ service_nlp/ service_link_scanner/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ -v
